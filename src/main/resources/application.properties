# ===============================
# SERVIDOR
# ===============================
spring.application.name=platform
server.port=9095

# ===============================
# CONEXION A POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/vidayoung_db
spring.datasource.username=vidayoung_user
spring.datasource.password=vidayoung0225
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Ejecuta schema.sql para actualizar tablas existentes sin borrar datos
spring.sql.init.mode=always

# ===============================
# SUBIDA DE ARCHIVOS
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# JWT
# ===============================
security.jwt.secret=vida-young-platform-jwt-secret-change-this-value-in-production
security.jwt.expiration-ms=86400000
